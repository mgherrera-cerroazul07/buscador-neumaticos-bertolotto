<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Neumáticos - Bertolotto</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', Arial, sans-serif;
        }
        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }
        
        /* Contenedor tipo recuadro bien compacto y centrado */
        .buscador-modulo {
            background: #ffffff;
            border: 2px solid #e1e1e1;
            border-top: 5px solid #ff0000; /* Rojo Bertolotto */
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 680px; /* Tamaño general más chico */
            width: 100%;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        /* Sección Izquierda: Tu imagen de Canva sin deformarse */
        .contenedor-imagen {
            width: 240px; /* Ancho controlado para que no sature */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .imagen-rueda {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* Sección Derecha: Todo el bloque del formulario encerrado */
        .contenedor-formulario {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
        }

        .titulo-form {
            font-size: 15px;
            font-weight: 700;
            color: #111111;
            line-height: 1.3;
        }

        .inputs-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .select-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: bold;
            color: #444;
            font-size: 15px;
        }

        .select-custom {
            padding: 8px 10px;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            background: #fff;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            min-width: 78px;
        }

        .select-custom:focus {
            border-color: #ff0000;
        }

        .btn-buscar {
            background: #ff0000;
            color: #ffffff;
            border: none;
            padding: 9px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .btn-buscar:hover {
            background: #cc0000;
        }

        /* Adaptación para pantallas de Celulares */
        @media (max-width: 600px) {
            .buscador-modulo {
                flex-direction: column;
                padding: 15px;
                text-align: center;
            }
            .contenedor-imagen {
                width: 200px;
            }
            .contenedor-formulario {
                width: 100%;
                align-items: center;
            }
            .inputs-wrapper {
                flex-direction: column;
                width: 100%;
                gap: 12px;
            }
            .select-group {
                width: 100%;
                justify-content: center;
            }
            .btn-buscar {
                width: 100%;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Recuadro Ajustado -->
    <div class="buscador-modulo">
        
        <!-- Tu imagen de Canva vinculada directamente -->
        <div class="contenedor-imagen">
            <img src="ruedaexplicativabertolotto.png" alt="Medidas Neumático" class="imagen-rueda">
        </div>

        <!-- Formulario Derecho Ordenado -->
        <div class="contenedor-formulario">
            <div class="titulo-form">¿Qué medida de neumático estás buscando?</div>
            
            <div class="inputs-wrapper">
                <div class="select-group">
                    <select id="ancho" class="select-custom">
                        <option value="">Ancho</option>
                        <option value="175">175</option>
                        <option value="185">185</option>
                        <option value="195">195</option>
                        <option value="205">205</option>
                        <option value="215">215</option>
                    </select>
                    <span>/</span>
                    
                    <select id="alto" class="select-custom">
                        <option value="">Alto</option>
                        <option value="45">45</option>
                        <option value="50">50</option>
                        <option value="55">55</option>
                        <option value="60">60</option>
                        <option value="65">65</option>
                    </select>
                    <span>R</span>
                    
                    <select id="rodado" class="select-custom">
                        <option value="">Rodado</option>
                        <option value="13">13</option>
                        <option value="14">14</option>
                        <option value="15">15</option>
                        <option value="16">16</option>
                        <option value="17">17</option>
                    </select>
                </div>

                <button type="button" class="btn-buscar" onclick="ejecutarBusqueda()">Buscar mi neumático</button>
            </div>
        </div>

    </div>

    <script>
        function ejecutarBusqueda() {
            var ancho = document.getElementById('ancho').value;
            var alto = document.getElementById('alto').value;
            var rodado = document.getElementById('rodado').value;

            if (!ancho || !alto || !rodado) {
                alert("Por favor, seleccioná las tres medidas.");
                return;
            }

            // Sistema de búsqueda oficial de Tiendanube
            var urlDestino = "https://bertolottocarcenter.mitiendanube.com/search/?q=" + ancho + "+" + alto + "+" + rodado;
            
            // Redirecciona la ventana del navegador completo
            window.parent.location.href = urlDestino;
        }
    </script>
</body>
</html>
